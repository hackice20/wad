<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <div class="bg-primary text-white p-3 vh-100" style="width: 220px;">
      <h4 class="mb-4">CollegeSys</h4>
      <ul class="nav flex-column">
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Dashboard</a></li>
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Students</a></li>
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Courses</a></li>
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Exams</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Settings</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1">
      <nav class="navbar bg-light px-4">
        <span class="navbar-brand mb-0 h5">Welcome, Admin</span>
      </nav>

      <div class="container py-4">
        <div class="row g-4">
          <div class="col-md-3">
            <div class="card text-center shadow-sm">
              <div class="card-body">
                <h6 class="card-title">Total Students</h6>
                <h4>1,250</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-center shadow-sm">
              <div class="card-body">
                <h6 class="card-title">Courses</h6>
                <h4>36</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-center shadow-sm">
              <div class="card-body">
                <h6 class="card-title">Professors</h6>
                <h4>58</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-center shadow-sm">
              <div class="card-body">
                <h6 class="card-title">Exams</h6>
                <h4>14 Upcoming</h4>
              </div>
            </div>
          </div>
        </div>

        <!-- Placeholder table -->
        <div class="mt-5">
          <h5>Recent Exam Results</h5>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>#</th>
                <th>Student</th>
                <th>Course</th>
                <th>Marks</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>Yash Kamble</td>
                <td>Data Structures</td>
                <td>88</td>
                <td><span class="badge bg-success">Pass</span></td>
              </tr>
              <tr>
                <td>2</td>
                <td>Tejas Patil</td>
                <td>Operating Systems</td>
                <td>45</td>
                <td><span class="badge bg-danger">Fail</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
